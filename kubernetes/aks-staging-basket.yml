apiVersion: apps/v1
kind: Deployment
metadata:
  name: basketservice
  namespace: ecommerce-staging
  labels:
    app: basketservice
    environment: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: basketservice
  template:
    metadata:
      labels:
        app: basketservice
        environment: staging
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      imagePullSecrets:
        - name: acr-pull-secret
      containers:
        - name: basketservice
          image: $(ACR_NAME).azurecr.io/basketservice:$(IMAGE_TAG)
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "750m"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: Redis__Configuration
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: connection-string
            - name: RabbitMq__HostName
              valueFrom:
                secretKeyRef:
                  name: messaging-secret
                  key: rabbitmq-host
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: appinsights-secret
                  key: connection-string
            - name: OpenTelemetry__Exporter
              value: AzureMonitor
            - name: OpenTelemetry__SamplingRatio
              value: "0.1"
            - name: OpenTelemetry__ServiceVersion
              value: "1.0.0"
            - name: OpenTelemetry__Environment
              value: Staging
---
apiVersion: v1
kind: Service
metadata:
  name: basket-clusterip-service
  namespace: ecommerce-staging
spec:
  type: ClusterIP
  selector:
    app: basketservice
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: basketservice-hpa
  namespace: ecommerce-staging
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: basketservice
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
