apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  datasources.yaml: |
    apiVersion: 1
    deleteDatasources:
      - name: Prometheus
        orgId: 1
      - name: Loki
        orgId: 1
      - name: Jaeger
        orgId: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus-loadbalancer:9090
        access: proxy
        isDefault: true
        version: 1
        editable: false
        jsonData:
          httpMethod: POST
          timeInterval: 10s
      - name: Loki
        type: loki
        uid: loki
        url: http://loki:3100
        access: proxy
        version: 1
        editable: false
        jsonData:
          derivedFields:
            - datasourceUid: jaeger
              matcherType: label
              matcherRegex: traceid
              name: TraceID
              url: "${__value.raw}"
              urlDisplayLabel: Open in Jaeger
      - name: Jaeger
        type: jaeger
        uid: jaeger
        url: http://jaeger:16686
        access: proxy
        version: 1
        editable: false
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: "-1m"
            spanEndTimeShift: "1m"
            filterByTraceID: false
            filterBySpanID: false
            customQuery: true
            query: '{service_name!=""} | traceid = "${__trace.traceId}"'
          tracesToMetrics:
            datasourceUid: prometheus
            spanStartTimeShift: "-2m"
            spanEndTimeShift: "2m"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-config
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        type: file
        disableDeletion: true
        updateIntervalSeconds: 10
        allowUiUpdates: false
        options:
          path: /etc/grafana/dashboards
          foldersFromFilesStructure: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
data:
  red-per-service.json: |
    {
      "annotations": { "list": [] },
      "description": "Rate / Error / Duration for a single microservice instance",
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 1, "showPoints": "never", "spanNulls": true }, "unit": "reqps" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 0 }, "id": 1,
          "options": { "legend": { "calcs": ["mean","max"], "displayMode": "list", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "single" } },
          "targets": [{ "datasource": { "type": "prometheus", "uid": "prometheus" }, "editorMode": "code", "expr": "sum(rate(http_server_request_duration_seconds_count{instance=~\"$instance\"}[$__rate_interval]))", "legendFormat": "req/s", "refId": "A" }],
          "title": "Request Rate", "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "red" }, "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 1, "showPoints": "never", "spanNulls": true }, "max": 100, "min": 0, "unit": "percent" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 0 }, "id": 2,
          "options": { "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "single" } },
          "targets": [{ "datasource": { "type": "prometheus", "uid": "prometheus" }, "editorMode": "code", "expr": "100 * sum(rate(http_server_request_duration_seconds_count{instance=~\"$instance\", http_response_status_code=~\"5..\"}[$__rate_interval])) / sum(rate(http_server_request_duration_seconds_count{instance=~\"$instance\"}[$__rate_interval]))", "legendFormat": "5xx %", "refId": "A" }],
          "title": "5xx Error Rate", "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 1, "showPoints": "never", "spanNulls": true }, "unit": "s" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 0 }, "id": 3,
          "options": { "legend": { "displayMode": "list", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "editorMode": "code", "expr": "histogram_quantile(0.5, sum(rate(http_server_request_duration_seconds_bucket{instance=~\"$instance\"}[$__rate_interval])) by (le))", "legendFormat": "p50", "refId": "A" },
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "editorMode": "code", "expr": "histogram_quantile(0.95, sum(rate(http_server_request_duration_seconds_bucket{instance=~\"$instance\"}[$__rate_interval])) by (le))", "legendFormat": "p95", "refId": "B" },
            { "datasource": { "type": "prometheus", "uid": "prometheus" }, "editorMode": "code", "expr": "histogram_quantile(0.99, sum(rate(http_server_request_duration_seconds_bucket{instance=~\"$instance\"}[$__rate_interval])) by (le))", "legendFormat": "p99", "refId": "C" }
          ],
          "title": "Request Latency (p50/p95/p99)", "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 1, "showPoints": "never", "spanNulls": true }, "unit": "reqps" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 }, "id": 4,
          "options": { "legend": { "displayMode": "table", "placement": "right", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [{ "datasource": { "type": "prometheus", "uid": "prometheus" }, "editorMode": "code", "expr": "sum by (http_route, http_response_status_code) (rate(http_server_request_duration_seconds_count{instance=~\"$instance\"}[$__rate_interval]))", "legendFormat": "{{http_route}} [{{http_response_status_code}}]", "refId": "A" }],
          "title": "Request Rate by Route", "type": "timeseries"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "tags": ["microservices","RED"],
      "templating": {
        "list": [
          { "current": {}, "datasource": { "type": "prometheus", "uid": "prometheus" }, "definition": "label_values(up{job=\"microservices\"}, instance)", "hide": 0, "includeAll": false, "label": "Service Instance", "multi": false, "name": "instance", "options": [], "query": { "qryType": 1, "query": "label_values(up{job=\"microservices\"}, instance)", "refId": "PrometheusVariableQueryEditor-VariableQuery" }, "refresh": 2, "regex": "", "sort": 1, "type": "query" }
