apiVersion: apps/v1
kind: Deployment
metadata:
  name: productservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: productservice
  template:
    metadata:
      labels:
        app: productservice
    spec:
      containers:
        - name: productservice
          image: <USERNAME>/productservice:latest
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: RabbitMq__HostName
              value: rabbitmq-clusterip-service
            - name: ConnectionStrings__Default
              value: Server=mssql-clusterip-service,1433;Database=Product;User Id=sa;Password=micR0S3rvice$;TrustServerCertificate=True
            - name: Authentication__AuthMicroserviceBaseAddress
              value: http://auth-clusterip-service:8080
            - name: OpenTelemetry__OtlpExporterEndpoint
              value: http://jaeger-clusterip-service:4317
            - name: OpenTelemetry__SamplingRatio
              value: "0.1"
            - name: OpenTelemetry__ServiceVersion
              value: "1.0.0"
            - name: OpenTelemetry__Environment
              value: Production
---
apiVersion: v1
kind: Service
metadata:
  name: product-clusterip-service
spec:
  type: ClusterIP
  selector:
    app: productservice
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: productservice-loadbalancer
spec:
  type: LoadBalancer
  selector:
    app: productservice
  ports:
    - protocol: TCP
      port: 8002
      targetPort: 8080
