apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: default
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
      evaluation_interval: 10s

    rule_files:
      - /etc/prometheus/alerts.yaml

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager:9093"]

    scrape_configs:
      - job_name: "kubernetes-pods"
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
  alerts.yaml: |
    groups:
      - name: microservice-http
        rules:
          - alert: HighHttpErrorRate
            expr: |
              (
                sum by (service_name) (
                  rate(http_server_request_duration_seconds_count{http_response_status_code=~"5.."}[5m])
                )
                /
                sum by (service_name) (
                  rate(http_server_request_duration_seconds_count[5m])
                )
              ) > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High 5xx error rate on {{ $labels.service_name }}"
              description: "{{ $labels.service_name }} is serving more than 5% 5xx responses over the last 5 minutes (current: {{ $value | humanizePercentage }})."

          - alert: HighHttpLatencyP95
            expr: |
              histogram_quantile(
                0.95,
                sum by (service_name, le) (
                  rate(http_server_request_duration_seconds_bucket[5m])
                )
              ) > 1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High p95 latency on {{ $labels.service_name }}"
              description: "{{ $labels.service_name }} p95 request duration is above 1s for 5 minutes (current: {{ $value }}s)."

      - name: platform-infra
        rules:
          - alert: RabbitMqQueueBacklog
            expr: rabbitmq_queue_messages_ready > 1000
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "RabbitMQ queue backlog on {{ $labels.queue }}"
              description: "Queue {{ $labels.queue }} (vhost {{ $labels.vhost }}) has more than 1000 ready messages for 5 minutes (current: {{ $value }})."

          - alert: ServiceDown
            expr: up == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Target {{ $labels.job }}/{{ $labels.instance }} is down"
              description: "Prometheus has been unable to scrape {{ $labels.instance }} (job {{ $labels.job }}) for 2 minutes."

      - name: inventory-business
        rules:
          - alert: LowStockAlert
            expr: sum(rate(stock_reservations_failed_total[5m])) > 0
            for: 5m
            labels:
              severity: warning
              service: inventory
            annotations:
              summary: "Inventory stock reservations are failing"
              description: "Inventory has been rejecting stock reservations for 5 minutes (current rate: {{ $value }}/s). Likely low/depleted stock."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: prometheus-config
              mountPath: /etc/prometheus/alerts.yaml
              subPath: alerts.yaml
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-loadbalancer
spec:
  type: LoadBalancer
  selector:
    app: prometheus
  ports:
    - protocol: TCP
      port: 9090
      targetPort: 9090
