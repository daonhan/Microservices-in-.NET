apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventoryservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventoryservice
  template:
    metadata:
      labels:
        app: inventoryservice
    spec:
      containers:
        - name: inventoryservice
          image: <USERNAME>/inventoryservice:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: RabbitMq__HostName
              value: rabbitmq-clusterip-service
            - name: ConnectionStrings__Default
              value: Server=mssql-clusterip-service,1433;Database=Inventory;User Id=sa;Password=micR0S3rvice$;TrustServerCertificate=True
            - name: Authentication__AuthMicroserviceBaseAddress
              value: http://auth-clusterip-service:8080
            - name: OpenTelemetry__OtlpExporterEndpoint
              value: http://jaeger-clusterip-service:4317
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-clusterip-service
spec:
  type: ClusterIP
  selector:
    app: inventoryservice
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: inventoryservice-loadbalancer
spec:
  type: LoadBalancer
  selector:
    app: inventoryservice
  ports:
    - protocol: TCP
      port: 8005
      targetPort: 8080
