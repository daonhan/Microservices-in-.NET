# RabbitMQ Exporter
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq-exporter
  template:
    metadata:
      labels:
        app: rabbitmq-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "9419"
    spec:
      containers:
        - name: rabbitmq-exporter
          image: kbudde/rabbitmq-exporter
          ports:
            - containerPort: 9419
          env:
            - name: RABBIT_URL
              value: http://rabbitmq-clusterip-service:15672
            - name: RABBIT_USER
              value: guest
            - name: RABBIT_PASSWORD
              value: guest
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-exporter-clusterip-service
spec:
  type: ClusterIP
  selector:
    app: rabbitmq-exporter
  ports:
    - port: 9419
      targetPort: 9419
---
