apiVersion: apps/v1
kind: Deployment
metadata:
  name: authservice
  namespace: ecommerce-prod
  labels:
    app: authservice
    environment: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: authservice
  template:
    metadata:
      labels:
        app: authservice
        environment: prod
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      imagePullSecrets:
        - name: acr-pull-secret
      volumes:
        - name: jwt-signing-key
          secret:
            secretName: auth-signing-secret
            items:
              - key: private-key-pem
                path: private.pem
      containers:
        - name: authservice
          image: $(ACR_NAME).azurecr.io/authservice:$(IMAGE_TAG)
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "512Mi"
              cpu: "300m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: jwt-signing-key
              mountPath: /app/keys
              readOnly: true
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ConnectionStrings__Default
              valueFrom:
                secretKeyRef:
                  name: db-auth-secret
                  key: connection-string
            - name: Authentication__AuthMicroserviceBaseAddress
              value: http://auth-clusterip-service:8080
            - name: Authentication__Signing__PrivateKeyPath
              value: /app/keys/private.pem
            - name: Authentication__Signing__KeyId
              valueFrom:
                secretKeyRef:
                  name: auth-signing-secret
                  key: key-id
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: appinsights-secret
                  key: connection-string
            - name: OpenTelemetry__Exporter
              value: AzureMonitor
            - name: OpenTelemetry__SamplingRatio
              value: "0.1"
            - name: OpenTelemetry__ServiceVersion
              value: "1.0.0"
            - name: OpenTelemetry__Environment
              value: Production
---
apiVersion: v1
kind: Service
metadata:
  name: auth-clusterip-service
  namespace: ecommerce-prod
spec:
  type: ClusterIP
  selector:
    app: authservice
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: authservice-hpa
  namespace: ecommerce-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: authservice
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
