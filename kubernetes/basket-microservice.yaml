apiVersion: apps/v1
kind: Deployment
metadata:
  name: basketservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: basketservice
  template:
    metadata:
      labels:
        app: basketservice
    spec:
      containers:
        - name: basketservice
          image: <USERNAME>/basketservice:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: RabbitMq__HostName
              value: rabbitmq-clusterip-service
            - name: Redis__Configuration
              value: redis-clusterip-service:6379
            - name: OpenTelemetry__OtlpExporterEndpoint
              value: http://jaeger-clusterip-service:4317
            - name: OpenTelemetry__SamplingRatio
              value: "0.1"
            - name: OpenTelemetry__ServiceVersion
              value: "1.0.0"
            - name: OpenTelemetry__Environment
              value: Production
---
apiVersion: v1
kind: Service
metadata:
  name: basket-clusterip-service
spec:
  type: ClusterIP
  selector:
    app: basketservice
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: basketservice-loadbalancer
spec:
  type: LoadBalancer
  selector:
    app: basketservice
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8080
