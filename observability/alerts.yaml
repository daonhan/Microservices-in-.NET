groups:
  - name: microservice-http
    rules:
      - alert: HighHttpErrorRate
        expr: |
          (
            sum by (service_name) (
              rate(http_server_request_duration_seconds_count{http_response_status_code=~"5.."}[5m])
            )
            /
            sum by (service_name) (
              rate(http_server_request_duration_seconds_count[5m])
            )
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate on {{ $labels.service_name }}"
          description: "{{ $labels.service_name }} is serving more than 5% 5xx responses over the last 5 minutes (current: {{ $value | humanizePercentage }})."

      - alert: HighHttpLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum by (service_name, le) (
              rate(http_server_request_duration_seconds_bucket[5m])
            )
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency on {{ $labels.service_name }}"
          description: "{{ $labels.service_name }} p95 request duration is above 1s for 5 minutes (current: {{ $value }}s)."

  - name: platform-infra
    rules:
      - alert: RabbitMqQueueBacklog
        expr: rabbitmq_queue_messages_ready > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RabbitMQ queue backlog on {{ $labels.queue }}"
          description: "Queue {{ $labels.queue }} (vhost {{ $labels.vhost }}) has more than 1000 ready messages for 5 minutes (current: {{ $value }})."

      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Target {{ $labels.job }}/{{ $labels.instance }} is down"
          description: "Prometheus has been unable to scrape {{ $labels.instance }} (job {{ $labels.job }}) for 2 minutes."

  - name: inventory-business
    rules:
      - alert: LowStockAlert
        expr: sum(rate(stock_reservations_failed_total[5m])) > 0
        for: 5m
        labels:
          severity: warning
          service: inventory
        annotations:
          summary: "Inventory stock reservations are failing"
          description: "Inventory has been rejecting stock reservations for 5 minutes (current rate: {{ $value }}/s). Likely low/depleted stock."
