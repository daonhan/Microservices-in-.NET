parameters:
  - name: serviceName
    type: string
  - name: solutionPath
    type: string
  - name: projectPath
    type: string
  - name: dockerfilePath
    type: string
  - name: acrName
    type: string
  - name: acrServiceConnection
    type: string
  - name: buildConfiguration
    type: string
    default: Release
  - name: dotnetSdkVersion
    type: string
    default: 10.0.x

stages:
  - stage: Build
    displayName: Build, test, and package ${{ parameters.serviceName }}
    jobs:
      - job: Build
        displayName: Build ${{ parameters.serviceName }}
        pool:
          vmImage: ubuntu-latest
        variables:
          imageRepository: ${{ parameters.acrName }}.azurecr.io/${{ parameters.serviceName }}
        steps:
          - checkout: self
            displayName: Checkout source

          - task: UseDotNet@2
            displayName: Use .NET SDK ${{ parameters.dotnetSdkVersion }}
            inputs:
              packageType: sdk
              version: ${{ parameters.dotnetSdkVersion }}

          - task: NuGetAuthenticate@1
            displayName: Authenticate NuGet feeds

          - script: dotnet restore "${{ parameters.solutionPath }}"
            displayName: Restore NuGet packages

          - script: dotnet format "${{ parameters.solutionPath }}" --verify-no-changes --verbosity minimal --no-restore
            displayName: Verify formatting

          - script: dotnet build "${{ parameters.solutionPath }}" --configuration ${{ parameters.buildConfiguration }} --no-restore
            displayName: Build solution

          - script: >-
              dotnet test "${{ parameters.solutionPath }}"
              --configuration ${{ parameters.buildConfiguration }}
              --no-build
              --logger trx
              --results-directory "$(Agent.TempDirectory)/TestResults"
              --collect:"XPlat Code Coverage"
              -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
            displayName: Run tests with coverage

          - task: PublishTestResults@2
            displayName: Publish test results
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: VSTest
              testResultsFiles: '$(Agent.TempDirectory)/TestResults/**/*.trx'
              failTaskOnFailedTests: true

          - task: PublishCodeCoverageResults@2
            displayName: Publish Cobertura coverage
            condition: succeededOrFailed()
            inputs:
              summaryFileLocation: '$(Agent.TempDirectory)/TestResults/**/coverage.cobertura.xml'

          - task: PublishPipelineArtifact@1
            displayName: Publish coverage artifact
            condition: succeededOrFailed()
            inputs:
              targetPath: '$(Agent.TempDirectory)/TestResults'
              artifactName: ${{ parameters.serviceName }}-coverage

          - script: dotnet publish "${{ parameters.projectPath }}" --configuration ${{ parameters.buildConfiguration }} --no-build --output "$(Build.ArtifactStagingDirectory)/publish/${{ parameters.serviceName }}"
            displayName: Publish application

          - publish: '$(Build.ArtifactStagingDirectory)/publish/${{ parameters.serviceName }}'
            displayName: Publish application artifact
            artifact: ${{ parameters.serviceName }}-publish

          - bash: |
              set -euo pipefail

              if [[ "${BUILD_SOURCEBRANCH}" == refs/tags/* ]]; then
                image_tag="${BUILD_SOURCEBRANCH#refs/tags/}"
              else
                branch="${BUILD_SOURCEBRANCH#refs/heads/}"
                branch="${branch//\//-}"
                image_tag="${branch}-${BUILD_BUILDNUMBER}"
              fi

              echo "##vso[task.setvariable variable=imageTag]${image_tag}"
              echo "##vso[task.setvariable variable=imageName]$(imageRepository):${image_tag}"
              echo "##vso[task.setvariable variable=imageTag;isOutput=true]${image_tag}"
              echo "##vso[task.setvariable variable=imageName;isOutput=true]$(imageRepository):${image_tag}"
              echo "Using image tag ${image_tag}"
            name: ComputeTag
            displayName: Compute Docker image tag

          - task: Docker@2
            displayName: Login to Azure Container Registry
            condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
            inputs:
              command: login
              containerRegistry: ${{ parameters.acrServiceConnection }}

          - task: Docker@2
            displayName: Build Docker image
            condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
            inputs:
              command: build
              Dockerfile: ${{ parameters.dockerfilePath }}
              buildContext: .
              repository: '$(imageRepository)'
              tags: '$(imageTag)'
              arguments: --build-arg BUILD_CONFIGURATION=${{ parameters.buildConfiguration }}

          - task: Docker@2
            displayName: Push Docker image
            condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
            inputs:
              command: push
              containerRegistry: ${{ parameters.acrServiceConnection }}
              repository: '$(imageRepository)'
              tags: '$(imageTag)'